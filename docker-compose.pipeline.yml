# ============================================================================
# Pipeline de traitement — Surveillance Citoyenne de la Pollution à Dakar
#
# Dépend de l'infra de base. Démarrage :
#
#   # 1. Infra d'abord (si pas déjà démarrée)
#   docker compose -f docker-compose.infra.yml up -d
#
#   # 2. Pipeline (workers + flows)
#   docker compose -f docker-compose.infra.yml -f docker-compose.pipeline.yml up -d
#
# Pour tout arrêter proprement :
#   docker compose -f docker-compose.infra.yml -f docker-compose.pipeline.yml down
# ============================================================================

services:

  # ── Workers permanents (ingestion + calibration + anomaly via supervisord) ─
  pipeline-workers:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    image: dakar-pipeline:latest
    container_name: dakar-pipeline-workers
    restart: unless-stopped
    command: ["supervisord", "-c", "/app/supervisord.conf"]
    depends_on:
      mosquitto:
        condition: service_healthy
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      # PostgreSQL
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-dakar_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}
      POSTGRES_DB: ${POSTGRES_DB:-dakar_pollution}
      # InfluxDB
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_ADMIN_TOKEN:?INFLUXDB_ADMIN_TOKEN requis}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-dakar_pollution}
      # MQTT
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      # Nombre de capteurs attendus par heure (pour Q1)
      EXPECTED_SENSORS: 10
    volumes:
      - ./pipeline/models:/app/models
      - pipeline-dead-letter:/app/dead_letter
      - pipeline-logs:/app/logs
    ports:
      - "9090:9090"
    networks: [dakar-net]
    healthcheck:
      test: ["CMD-SHELL", "supervisorctl -c /app/supervisord.conf status | grep -v STOPPED | grep -q RUNNING || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Ordonnanceur de flows (APScheduler — feature engineering, prédictions…) ─
  pipeline-flows:
    image: dakar-pipeline:latest
    container_name: dakar-pipeline-flows
    restart: unless-stopped
    command: ["python", "/app/run_flows.py"]
    depends_on:
      pipeline-workers:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-dakar_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}
      POSTGRES_DB: ${POSTGRES_DB:-dakar_pollution}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_ADMIN_TOKEN:?INFLUXDB_ADMIN_TOKEN requis}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-dakar_pollution}
      EXPECTED_SENSORS: 10
    volumes:
      - ./pipeline/models:/app/models       # bind mount hôte — même stockage que start.sh
      - pipeline-logs:/app/logs
    networks: [dakar-net]

  # ── Simulateur de capteurs IoT (publie en continu sur MQTT) ─────────────────
  # Sans capteurs physiques, c'est la SEULE source de données du pipeline.
  # Démarre automatiquement avec le pipeline → le dashboard n'est jamais vide.
  # Pas de depends_on (mosquitto est dans docker-compose.infra.yml) : si le broker
  # n'est pas prêt, le conteneur sort et restart:unless-stopped relance jusqu'au
  # succès de la connexion MQTT.
  simulator:
    build:
      context: ./simulation
      dockerfile: Dockerfile
    image: dakar-simulator:latest
    container_name: dakar-simulator
    restart: unless-stopped
    command: ["python", "data_generator.py",
              "--broker", "mosquitto", "--port", "1883",
              "--interval", "10", "--duration", "0", "--headless"]
    networks: [dakar-net]

networks:
  dakar-net:
    external: true         # réseau créé par docker-compose.infra.yml

volumes:
  pipeline-dead-letter:
  pipeline-logs:
