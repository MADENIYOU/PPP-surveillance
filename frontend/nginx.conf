# Nginx — SPA React + proxy /api vers le backend (réseau docker dakar-net)
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Headers de sécurité (cohérents avec le backend)
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # SPA : toute route inconnue → index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API (évite le CORS en production locale)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }
}
