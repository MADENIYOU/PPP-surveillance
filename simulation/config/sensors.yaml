    zone_id: "medina"
    lat: 14.7067
    lon: -17.4520
    altitude_m: 12
    pollution_profile: "urban_medium"
    battery:
      capacity_mah: 3000
      solar_panel: true
      solar_power_w: 5
    install_date: "2026-06-01"
    calibration_date: "2026-06-01"

  - id: "ESP32-DK-PLATEAU-001"
