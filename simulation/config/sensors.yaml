# ============================================================================
# Définition des 10 capteurs simulés — Simulation Dakar (DIC2)
# Référence : simulation/SIMULATION_SPEC.md §6.1
#
# NB : "global" adapté à l'infra Phase 3 réellement déployée
# (implementation/docker-compose.infra.yml) — Mosquitto sans TLS sur 1883
# (allow_anonymous true). Le bloc TLS du document de spec sera réactivé en
# S3.3 quand les certificats existeront (voir mosquitto.conf, PKI_SPEC.md).
# ============================================================================
global:
  mqtt_broker: "localhost"
  mqtt_port: 1883
  tls_enabled: false
  publish_interval_s: 30
  default_firmware: "sim-v1.2.0"

sensors:
