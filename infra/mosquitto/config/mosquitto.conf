# ============================================================================
# Configuration Mosquitto — Surveillance Pollution Dakar (DIC2)
# Référence : 06_gestion/ROADMAP_PHASE_3.md (I3.6) + 03_securite/PKI_SPEC.md
# ============================================================================

persistence true
persistence_location /mosquitto/data/
log_dest stdout

# ── Listener MQTT clair (Phase 3) ───────────────────────────────────────────
# allow_anonymous true : volontairement permissif en Phase 3 pour permettre au
# simulateur et aux tests de se connecter sans certificats. Retiré en S3.3
# lorsque l'authentification mTLS devient obligatoire (cf. PKI_SPEC.md).
listener 1883
allow_anonymous true

# ── Listener WebSockets (dashboard temps réel / debug) ──────────────────────
listener 9001
protocol websockets
allow_anonymous true

# ── Listener TLS/mTLS (activé en S3.3 une fois les certificats générés) ─────
# Décommenter ce bloc après exécution de S3.3 (génération CA + certs serveur/
# clients dans implementation/infra/mosquitto/certs/, voir 03_securite/PKI_SPEC.md).
# Tant que les fichiers référencés n'existent pas, Mosquitto refuse de démarrer
# si ce bloc est actif — d'où son désactivation par défaut en Phase 3.
#
# listener 8883
# cafile      /mosquitto/certs/ca.crt
# certfile    /mosquitto/certs/server.crt
# keyfile     /mosquitto/certs/server.key
# require_certificate true
# tls_version tlsv1.3
