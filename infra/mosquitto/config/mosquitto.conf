# ============================================================================
# Configuration Mosquitto — Surveillance Pollution Dakar (DIC2)
# Référence : 06_gestion/ROADMAP_PHASE_3.md (I3.6) + 03_securite/PKI_SPEC.md
# ============================================================================

persistence true
persistence_location /mosquitto/data/
log_dest stdout

# ── Listener MQTT clair (Phase 3) ───────────────────────────────────────────
# allow_anonymous true : volontairement permissif en Phase 3 pour permettre au
# simulateur et aux tests de se connecter sans certificats. Retiré en S3.3
# lorsque l'authentification mTLS devient obligatoire (cf. PKI_SPEC.md).
listener 1883
allow_anonymous true

# ── Listener WebSockets (dashboard temps réel / debug) ──────────────────────
listener 9001
protocol websockets
allow_anonymous true

# ── Listener TLS/mTLS (S3.3) ─────────────────────────────────────────────────
# Activé par infra/mosquitto/certs/generate_certs.sh, qui génère la PKI
# (CA + certs serveur/clients, voir 03_securite/PKI_SPEC.md) puis écrit
# conf.d/tls.conf (listener 8883, mTLS obligatoire). Tant que conf.d/ ne
# contient aucun .conf, le broker démarre sans TLS (Phase 3) — include_dir
# ignore simplement un répertoire vide.
include_dir /mosquitto/config/conf.d
